# One-click deploy to Render.com — connect this repo and it reads this file.
services:
  - type: web
    name: tailorcv
    runtime: docker
    plan: starter
    envVars:
      # Signs session cookies. Auto-generated by Render so the app never boots
      # with the insecure placeholder. REQUIRED — without it, sessions are forgeable.
      - key: SESSION_SECRET
        generateValue: true
      # Google sign-in. Set these in the dashboard, or set AUTH_DISABLED=1 to skip.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false   # set this in the Render dashboard (kept secret)
      - key: REVIEWER_MODEL
        value: claude-sonnet-4-6
      - key: SYNTH_MODEL
        value: claude-sonnet-4-6
